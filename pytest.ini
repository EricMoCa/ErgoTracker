[pytest]
testpaths = schemas pose_pipeline ergo_engine llm_rules reports api advanced_pipeline
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short
markers =
    gpu: tests que requieren GPU real (omitir con -m "not gpu")
    integration: tests de integración que requieren servicios externos (Ollama, etc.)
